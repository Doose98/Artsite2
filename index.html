<
<div id="lightbox">

</div>


    
<script>
const images = [
    "space.png","land3.png","drones.png","smoking.png","land2.png",
    "jane.png","lucy.png","greeet.png","main.jpg","golden.png","hi.png","aura.png",
"city.png",
];

function getRandom(exclude) {
    let img;
    do {
        img = images[Math.floor(Math.random() * images.length)];
    } while (img === exclude);
    return img;
}

function updatePanel(panelId, isSide = false) {
    const panel = document.getElementById(panelId);

    if (isSide) {
        panel.innerHTML = `
            <img src="${getRandom()}">
            <img src="${getRandom()}">
        `;
    } else {
        panel.innerHTML = `<img src="${getRandom()}">`;
    }

    panel.querySelectorAll("img").forEach(img => {
        img.onclick = () => openLightbox(img);
    });
}

function startPanels() {
    updatePanel("left-panel", true);
    updatePanel("center-panel");
    updatePanel("right-panel", true);

    setInterval(() => updatePanel("left-panel", true), 4000);
    setInterval(() => updatePanel("center-panel"), 3000);
    setInterval(() => updatePanel("right-panel", true), 4500);
}

startPanels();
</script>
<script>
function openLightbox(img) {
    const lightbox = document.getElementById("lightbox");
    const lightImg = document.getElementById("lightbox-img");

    const rect = img.getBoundingClientRect();

    // set starting position
    lightImg.src = img.src;
    lightImg.style.position = "absolute";
    lightImg.style.top = rect.top + "px";
    lightImg.style.left = rect.left + "px";
    lightImg.style.width = rect.width + "px";
    lightImg.style.height = rect.height + "px";

    lightbox.style.display = "flex";

    // trigger animation
    requestAnimationFrame(() => {
        lightImg.style.transition = "all 0.4s ease";
        lightImg.style.top = "50%";
        lightImg.style.left = "50%";
        lightImg.style.transform = "translate(-50%, -50%)";
        lightImg.style.width = "90vw";
        lightImg.style.height = "90vh";
    });
}

function closeLightbox() {
    const lightbox = document.getElementById("lightbox");
    const lightImg = document.getElementById("lightbox-img");

    lightImg.style.transition = "all 0.3s ease";
    lightImg.style.opacity = "0";

    setTimeout(() => {
        lightbox.style.display = "none";
        lightImg.removeAttribute("style");
    }, 300);
}

document.getElementById("lightbox").addEventListener("click", closeLightbox);
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("fade-in");

    document.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", function(e) {

            // ignore external links
            if (this.target === "_blank") return;

            e.preventDefault();
            const url = this.href;

            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = url;
            }, 400); // matches CSS time
        });
    });
});
</script>
