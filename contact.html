<section id="contact-section">

    <!-- LEFT SIDE -->
    <div class="contact-info">
        <h2>Let's Work Together</h2>
        <p>
            Interested in collaborating or commissioning artwork?
            Feel free to reach out using the form.
            I’ll get back to you as soon as possible.
        </p>

       <form action="https://formsubmit.co/debatrez98@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="thankyou.html">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

</form>
    </div>

        <img src="mafia2.png" alt="Contact Artwork">
    </div>

</section>

<footer>
    <p>© 2026 ArtSite Portfolio</p>
</footer>
<script>
document.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("fade-in");

    document.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", function(e) {

            // ignore external links
            if (this.target === "_blank") return;

            e.preventDefault();
            const url = this.href;

            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = url;
            }, 400); // matches CSS time
        });
    });
});
</script>
</body>
